name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install fastapi uvicorn pydantic pydantic-settings \
            python-jose passlib bcrypt structlog tenacity \
            python-dotenv regex email-validator sqlalchemy asyncpg psycopg2-binary \
            python-multipart httpx

      - name: Run tests
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t magnumai-backend:test ./backend

      - name: Build frontend image
        run: docker build -t magnumai-frontend:test ./frontend
